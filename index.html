<!doctype html>
<html lang='pt-br'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Meu AuMigu</title>
<style>
:root{
  --bg:#fbf7f0;
  --ink:#6f6630;
  --text:#766f61;
  --card:#f3ead7;
  --line:#d9ccb2;
  --button:#a89c59;
  --button-dark:#93884a;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family: Georgia, 'Times New Roman', serif;
  background:var(--bg);
  color:var(--text);
}
.page{
  width:100%;
  overflow-x:hidden;
}
.hero{
  text-align:center;
  padding: 0 16px 26px;
}
.hero-media{
  width:min(100%, 760px);
  margin:0 auto;
}
.hero-media img{
  width:100%;
  height:auto;
  display:block;
  margin:0 auto;
  border-radius:0;
  object-fit:contain;
}
.hero-brand{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin: 12px auto 10px;
  color:#8c6c54;
}
.hero-brand .brand-text{
  font-size:24px;
  letter-spacing:1px;
  line-height:1;
}
.hero-brand svg{
  width:56px;
  height:56px;
  flex:none;
}
h1{
  font-size: clamp(32px, 8.8vw, 66px);
  line-height:1.06;
  letter-spacing:-0.02em;
  color:var(--ink);
  margin: 10px auto 18px;
  max-width: 820px;
  font-weight:500;
}
h1 i{
  font-style:italic;
  font-weight:400;
}
p{
  max-width: 760px;
  margin: 0 auto;
  line-height:1.55;
  font-size: clamp(18px, 4.6vw, 28px);
}
p strong{ color: var(--ink); }
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin:28px auto 16px;
  padding:18px 28px;
  min-height:68px;
  min-width:min(92vw, 640px);
  border-radius:999px;
  text-decoration:none;
  font-family: Arial, Helvetica, sans-serif;
  font-size: clamp(18px, 4.4vw, 26px);
  font-weight:700;
  letter-spacing:.02em;
  color:#fff;
  background:linear-gradient(180deg, #b8ad6e 0%, var(--button) 55%, var(--button-dark) 100%);
  box-shadow: inset 0 0 0 2px rgba(255,255,255,.18), 0 10px 24px rgba(108,96,44,.18);
}
.features{
  display:flex;
  flex-direction:column;
  gap:14px;
  align-items:center;
  margin-top:18px;
  margin-bottom:10px;
}
.card{
  display:flex;
  align-items:center;
  gap:12px;
  background:#f2ead8;
  padding:12px 16px;
  border-radius:14px;
  width:min(92vw, 320px);
  font-family: Arial, Helvetica, sans-serif;
  font-size: clamp(16px, 4.3vw, 22px);
  color:#5f5530;
  font-weight:600;
}
.icon{
  width:26px;
  height:26px;
  display:grid;
  place-items:center;
  flex:none;
}
.icon svg{
  width:24px;
  height:24px;
  stroke:#6b5d2e;
}
@media (min-width:768px){
  .hero{ padding: 8px 24px 40px; }
  .hero-brand{ margin-top:18px; }
  .features{ flex-direction:row; justify-content:center; align-items:stretch; flex-wrap:wrap; gap:18px; }
  .card{ width:260px; justify-content:center; }
}
</style>
</head>
